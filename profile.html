<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملف الشخصي - GradConnect</title>
<link rel="stylesheet" href="styles/profile.css">
</head>

<body>

<!-- الهيدر -->
<div class="header">
    <div class="logo-section">
        <img src="assets/images/logo.png" class="logo" alt="GradConnect">
        <h2 class="platfrom-name">GradConnect</h2>
    </div>
    <div class="nav">
        <a href="dashboard.html"><h2>الصفحة الرئيسية</h2></a>
    </div>
</div>

<!-- محتوى الصفحة -->
<div class="container">
    <div class="profile-box">

        <div class="left-side">
            <img id="userImage" src="assets/images/user.png" class="profile-img" alt="Profile">
            <h2 id="name"></h2>
            <p id="role"></p>
        </div>

        <div class="right-side">
            <h2>المعلومات الشخصية</h2>

            <div class="info">
                <span>الاسم:</span>
                <p id="name2"></p>
            </div>

            <div class="info">
                <span>البريد الإلكتروني:</span>
                <p id="email"></p>
            </div>

            <div class="info">
                <span>نوع المستخدم:</span>
                <p id="role2"></p>
            </div>

            <div class="info">
                <span>تغيير الصورة:</span>
                <input type="file" id="imageUpload" accept="image/*" onchange="uploadImage()">
                <p class="upload-note">اختر صورة جديدة لتحديث ملفك الشخصي</p>
            </div>

            <button onclick="logout()">تسجيل خروج</button>
        </div>

    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script src="scripts/config/firebase-config.js"></script>
<script src="scripts/modules/auth.js"></script>
<script src="scripts/modules/users.js"></script>
<script src="scripts/modules/storage.js"></script>
<script src="scripts/utils/utils.js"></script>

<script>

// Auth guard — single, clean listener
waitForFirebase(() => {
    const unsubAuth = auth.onAuthStateChanged(async (user) => {
        unsubAuth();
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        await loadProfile(user.uid);
    });
});

async function loadProfile(uid) {
    try {
        const userData = await getCurrentUserData(uid);
        if (!userData) {
            console.warn('User doc not found for uid:', uid);
            return;
        }

        document.getElementById("name").innerText   = userData.name;
        document.getElementById("name2").innerText  = userData.name;
        document.getElementById("email").innerText  = userData.email;
        document.getElementById("role").innerText   = userData.role;
        document.getElementById("role2").innerText  = userData.role;

        if (userData.imageUrl) {
            document.getElementById("userImage").src = userData.imageUrl;
        }
    } catch (error) {
        console.error("Error loading profile:", error);
        showMessage("حدث خطأ في تحميل البيانات", "error");
    }
}

async function uploadImage() {
    const file = document.getElementById("imageUpload").files[0];
    if (!file) return;

    const uid = auth.currentUser && auth.currentUser.uid;
    if (!uid) return;

    showMessage("جاري رفع الصورة...", "info");
    const result = await uploadProfileImage(uid, file);

    if (result.success) {
        document.getElementById("userImage").src = result.url;
        showMessage("تم تحديث الصورة بنجاح ✓", "success");
    } else {
        showMessage(result.error, "error");
    }
}

async function logout() {
    if (!confirm("هل تريد تسجيل الخروج؟")) return;
    const result = await logoutUser();
    if (result.success) {
        window.location.href = "index.html";
    } else {
        showMessage(result.error, "error");
    }
}

window.addEventListener('beforeunload', () => updateOnlineStatus(false));
window.uploadImage = uploadImage;
window.logout = logout;

</script>

</body>
</html>
