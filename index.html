<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <title>GradConnect | تسجيل الدخول</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles/login.css" />

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>

<main class="container">

    <!-- LEFT -->
    <section class="left">
        <div class="overlay">
            <div class="hero-content">
                <h1>خطوتك الأولى</h1>
                <h2>نحو مستقبلك المهني</h2>
                <p>منصة تساعد الخريجين على التواصل وبناء مستقبل مهني قوي.</p>
            </div>
        </div>
    </section>

    <!-- RIGHT -->
    <section class="right">

        <img src="assets/images/logo.png" class="logo" />

        <div class="subtitle">
            <h1>مرحباً بعودتك 👋</h1>
            <h2>سجل دخولك إلى GradConnect</h2>
        </div>

        <form class="login-form" onsubmit="event.preventDefault(); login();">

            <div class="input-box">
                <label>البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="example@gmail.com" autocomplete="email" required />
                </div>
            </div>

            <div class="input-box">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" />
                    <span>تذكرني</span>
                </label>
                <a href="forget_password.html">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" class="btn" id="loginBtn">
                <span id="btnText">تسجيل الدخول</span>
                <span id="btnLoader" class="loader" style="display:none;"></span>
            </button>

        </form>

        <div class="links">
            <p>ليس لديك حساب؟ <a href="login.html">إنشاء حساب جديد</a></p>
        </div>

    </section>

</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script src="scripts/config/firebase-config.js"></script>

<script>

waitForFirebase(() => {
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.replace("dashboard.html");
        }
    });
});

async function login() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        showMessage("املأ جميع البيانات", "error");
        return;
    }

    toggleLoader(true);

    try {

        const userCredential =
            await auth.signInWithEmailAndPassword(email, password);

        const user = userCredential.user;

        await db.collection("users").doc(user.uid).set({
            online: true,
            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        showMessage("تم تسجيل الدخول ✓", "success");

        // ❌ مفيش redirect هنا (Firebase هو اللي هيعمله)

    } catch (error) {

        let msg = "خطأ في تسجيل الدخول";

        switch (error.code) {
            case "auth/user-not-found":
                msg = "المستخدم غير موجود";
                break;

            case "auth/wrong-password":
                msg = "كلمة المرور خطأ";
                break;

            case "auth/invalid-email":
                msg = "الإيميل غير صحيح";
                break;

            case "auth/too-many-requests":
                msg = "محاولات كثيرة حاول لاحقًا";
                break;

            case "auth/invalid-credential":
                msg = "بيانات غير صحيحة";
                break;
        }

        showMessage(msg, "error");

    } finally {
        toggleLoader(false);
    }
}


function toggleLoader(show) {
    const btn    = document.getElementById("loginBtn");
    const text   = document.getElementById("btnText");
    const loader = document.getElementById("btnLoader");
    btn.disabled = show;
    text.style.display   = show ? "none" : "inline";
    loader.style.display = show ? "inline-block" : "none";
}

function showMessage(message, type) {
    const old = document.querySelector(".message-box");
    if (old) old.remove();
    const div = document.createElement("div");
    div.className = "message-box " + type;
    div.textContent = message;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3500);
}

// Enter key on password field
document.getElementById("password").addEventListener("keypress", (e) => {
    if (e.key === "Enter") login();
});

</script>

</body>
</html>
