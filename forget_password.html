<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور - GradConnect</title>
    <link rel="stylesheet" href="styles/forget.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>

    <div class="container">
        <div class="icon-section">
            <div class="envelope">
                <div class="shield">
                    <span class="lock">🔒</span>
                </div>
            </div>
        </div>

        <h2>هل نسيت كلمة المرور؟</h2>
        <p>اكتب بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>

        <form onsubmit="resetPasswordHandler(event)">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@email.com" required>
            
            <button type="submit" class="btn-reset" id="resetBtn">
                <span id="btnText">إرسال رابط إعادة التعيين</span>
                <span id="btnLoader" class="loader" style="display:none;"></span>
            </button>
        </form>

        <a href="index.html" class="back-link">← الرجوع لتسجيل الدخول</a>
    </div>

<script src="scripts/config/firebase-config.js"></script>
<script src="scripts/modules/auth.js"></script>
<script src="scripts/modules/users.js"></script>
<script src="scripts/utils/utils.js"></script>
<script>

async function resetPasswordHandler(event) {
    event.preventDefault();
    
    const email = document.getElementById("email").value.trim();
    
    if (email === "") {
        showMessage("من فضلك أدخل البريد الإلكتروني", "error");
        return;
    }
    
    const emailValidation = validateEmail(email);
    if (!emailValidation) {
        showMessage("البريد الإلكتروني غير صالح", "error");
        return;
    }
    
    toggleLoader(true, "resetBtn");
    
    const result = await resetPassword(email);
    
    if (result.success) {
        showMessage("تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني ✓", "success");
        
        setTimeout(() => {
            window.location.href = "index.html";
        }, 3000);
    } else {
        showMessage(result.error, "error");
        toggleLoader(false, "resetBtn");
    }
}

function toggleLoader(show, buttonId) {
    const btn = document.getElementById(buttonId);
    const btnText = document.getElementById("btnText");
    const loader = document.getElementById("btnLoader");
    
    if (show) {
        btn.disabled = true;
        btnText.style.display = "none";
        loader.style.display = "inline-block";
    } else {
        btn.disabled = false;
        btnText.style.display = "inline";
        loader.style.display = "none";
    }
}

// Make resetPasswordHandler function global for onsubmit
window.resetPassword = resetPasswordHandler;
</script>
</body>
</html>
